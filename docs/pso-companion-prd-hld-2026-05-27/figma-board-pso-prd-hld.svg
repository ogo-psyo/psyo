<text font-family="Inter, Arial, sans-serif" font-size="21" font-weight="400" fill="#6E6258"><tspan x="80" y="980">Principles: companion-first UI · privacy-first backend · guest start, auth persistence ·</tspan><tspan x="80" y="1006">approximate map data · assistant is safety-bounded.</tspan></text>
