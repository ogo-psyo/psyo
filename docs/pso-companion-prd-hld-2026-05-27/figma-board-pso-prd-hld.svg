<rect width="2400" height="1800" fill="#F5EFE5"/>
<rect x="50" y="40" width="2300" height="170" rx="34" fill="#2B211C" stroke="#2B211C" stroke-width="0"/>
<text font-family="Inter, Arial, sans-serif" font-size="54" font-weight="800" fill="#FFF8ED"><tspan x="88" y="112">Псё / PRD + HLD + информационная модель</tspan></text>
<text font-family="Inter, Arial, sans-serif" font-size="24" font-weight="400" fill="#EAD8C4"><tspan x="92" y="162">Лучший друг питомца и его владельца · Всё про пса в одном живом центре · Living Companion OS</tspan></text>
<text font-family="Inter, Arial, sans-serif" font-size="25" font-weight="700" fill="#FFF8ED"><tspan x="2020" y="96">Figma-ready board</tspan></text>
<text font-family="Inter, Arial, sans-serif" font-size="22" font-weight="400" fill="#EAD8C4"><tspan x="2020" y="132">2026-05-27</tspan></text>
<rect x="50" y="250" width="560" height="260" rx="28" fill="#FFF9EF" stroke="#D6C7B6" stroke-width="2"/>
<rect x="50" y="250" width="560" height="12" rx="6" fill="#E86F3A"/>
<text font-family="Inter, Arial, sans-serif" font-size="30" font-weight="700" fill="#201A16"><tspan x="74" y="298">1. Product thesis</tspan></text>
<text font-family="Inter, Arial, sans-serif" font-size="21" font-weight="400" fill="#6E6258"><tspan x="74" y="346">Псё не “анкета про собаку” и не магазин. Это</tspan><tspan x="74" y="374">ежедневный companion: состояние пса, один</tspan><tspan x="74" y="402">следующий заботливый шаг, память/паспорт,</tspan><tspan x="74" y="430">карта заботы, ассистент и вещи — в одной</tspan><tspan x="74" y="458">системе.</tspan></text>
<rect x="640" y="250" width="560" height="260" rx="28" fill="#FFF9EF" stroke="#D6C7B6" stroke-width="2"/>
<rect x="640" y="250" width="560" height="12" rx="6" fill="#5F8D5A"/>
<text font-family="Inter, Arial, sans-serif" font-size="30" font-weight="700" fill="#201A16"><tspan x="664" y="298">2. MVP promise</tspan></text>
<text font-family="Inter, Arial, sans-serif" font-size="21" font-weight="400" fill="#6E6258"><tspan x="664" y="346">За 30–60 секунд пользователь понимает:</tspan><tspan x="664" y="374">приложение знает моего пса и помогает</tspan><tspan x="664" y="402">сегодня. Работает в guest mode, но</tspan><tspan x="664" y="430">cloud/auth становится источником правды для</tspan><tspan x="664" y="458">приватных данных.</tspan></text>
<rect x="1230" y="250" width="560" height="260" rx="28" fill="#FFF9EF" stroke="#D6C7B6" stroke-width="2"/>
<rect x="1230" y="250" width="560" height="12" rx="6" fill="#4E6E91"/>
<text font-family="Inter, Arial, sans-serif" font-size="30" font-weight="700" fill="#201A16"><tspan x="1254" y="298">3. North-star screen</tspan></text>
<text font-family="Inter, Arial, sans-serif" font-size="21" font-weight="400" fill="#6E6258"><tspan x="1254" y="346">Today: dog status → next best care action →</tspan><tspan x="1254" y="374">care snapshot →</tspan><tspan x="1254" y="402">map/passport/assistant/wishlist teasers.</tspan><tspan x="1254" y="430">Один главный шаг, не десять равных карточек.</tspan></text>
<rect x="1820" y="250" width="530" height="260" rx="28" fill="#FFF9EF" stroke="#D6C7B6" stroke-width="2"/>
<rect x="1820" y="250" width="530" height="12" rx="6" fill="#E86F3A"/>
<text font-family="Inter, Arial, sans-serif" font-size="30" font-weight="700" fill="#201A16"><tspan x="1844" y="298">4. Safety boundaries</tspan></text>
<text font-family="Inter, Arial, sans-serif" font-size="21" font-weight="400" fill="#6E6258"><tspan x="1844" y="346">Нет диагнозов и назначений. Точные</tspan><tspan x="1844" y="374">домашние GPS не публикуем. Public card</tspan><tspan x="1844" y="402">показывает только явно разрешённое.</tspan><tspan x="1844" y="430">API/RLS — граница приватности.</tspan></text>
